<!DOCTYPE html>
<html>
<head>
<title>AI Agriculture System</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<div class="header">
🌍 Namibia Smart Agriculture Dashboard
</div>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="box">
<h3>📍 Select Location</h3>
<div id="map"></div>
<p id="coords">Lat: -22.56 | Lon: 17.06</p>
</div>

<div class="box">
<h3>📊 Choose Graph</h3>

<select id="graphType">
<option value="rain">Rainfall</option>
<option value="temp">Temperature</option>
<option value="combined">Combined</option>
</select>

<canvas id="chart"></canvas>

<button onclick="downloadImage()">Download JPG</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="box">
<h3>📊 Results</h3>

<p>🌿 Greenery: <span id="green">--</span></p>
<p>💧 Water: <span id="water">--</span></p>
<p>🌾 Crops: <span id="crops">--</span></p>

</div>

<div class="box">
<h3>🤖 Chatbot</h3>
<div id="chat"></div>
<input id="input" placeholder="Ask something...">
</div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
