<!DOCTYPE html>
<html>
<head>
    <title>AI Agriculture System</title>

    <link rel="stylesheet" href="style.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<div class="header">
    🌍 AI Agriculture Decision System (Namibia)
</div>

<div class="container">

    <!-- LEFT -->
    <div class="left">

        <div class="box">
            <h3>📍 Select Farm Location</h3>
            <div id="map"></div>
            <p id="coords">Lat: -22.56 | Lon: 17.06</p>
        </div>

        <div class="box">
            <h3>📈 Rainfall Time Series</h3>
            <canvas id="chart"></canvas>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="box">
            <h3>📊 Analysis Results</h3>

            <div class="metric">🌿 Greenery: <span id="green">35%</span></div>
            <div class="metric">💧 Water: <span id="water">12%</span></div>
            <div class="metric">🧱 Soil: Sandy</div>
            <div class="metric">🌍 Land: Grassland</div>
            <div class="metric">🐄 Grazing: Good</div>
            <div class="metric">🌾 Crops: <span id="crops">Millet</span></div>

        </div>

        <div class="box">
            <h3>🤖 Chatbot</h3>
            <div id="chat"></div>
            <input id="input" placeholder="Ask about crops, soil, water...">
        </div>

    </div>

</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
