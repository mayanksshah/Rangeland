<!DOCTYPE html>
<html>
<head>
<title>Namibia Agriculture AI</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<div class="header">
🌍 Namibia Smart Agriculture Dashboard
</div>

<div class="container">

<div class="left">

<div id="map"></div>

<select id="graphType">
<option value="rain">Rainfall</option>
<option value="temp">Temperature</option>
<option value="ndvi">NDVI</option>
<option value="combined">Combined</option>
<option value="moving">Moving Avg</option>
<option value="variability">Variability</option>
<option value="cumulative">Cumulative</option>
<option value="growth">Growth Index</option>
</select>

<canvas id="chart"></canvas>

</div>

<div class="right">

<h3>📊 Results</h3>
<p>Crop: <span id="crop">--</span></p>
<p>NDVI: <span id="ndviVal">--</span></p>
<p>Yield: <span id="yield">--</span></p>

<div class="box">
<h3>🤖 Chatbot</h3>
<div id="chat"></div>
<input id="input" placeholder="Ask something...">
</div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
