<!DOCTYPE html>
<html>
<head>
<title>Namibia Agriculture System</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<h2 class="header">🌍 Namibia Agriculture Intelligence System</h2>

<p id="loading">⏳ Loading data... please wait</p>

<div class="container">

<div class="left">

<div id="map"></div>

<div class="inputs">
Lat: <input id="latInput" value="-22.56">
Lon: <input id="lonInput" value="17.06">
<button onclick="manualLocate()">Go</button>
</div>

<p id="place"></p>

<select id="graphType">
<option value="rain">Rainfall</option>
<option value="temp">Temperature</option>
<option value="ndvi">NDVI</option>
<option value="combined">Combined</option>
</select>

<canvas id="chart"></canvas>

<br>
<button onclick="downloadImage()">Download JPG</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div class="right">

<h3>Results</h3>

<p>Temperature: <span id="tempVal"></span></p>
<p>Rainfall: <span id="rainVal"></span></p>
<p>NDVI: <span id="ndviVal"></span></p>

<p>Land: <span id="land"></span></p>
<p>Recommendation: <span id="rec"></span></p>

<div id="cropDetails"></div>

<h3>Chatbot</h3>
<div id="chat"></div>
<input id="input" placeholder="Ask about crops...">

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
