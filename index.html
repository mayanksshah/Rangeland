<!DOCTYPE html>
<html>
<head>
<title>Namibia Agriculture AI</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<div class="header">🌍 Namibia Agriculture Intelligence System</div>

<div class="container">

<div class="left">

<div id="map"></div>

<div class="inputBox">
Lat: <input id="latInput" value="-22.56">
Lon: <input id="lonInput" value="17.06">
<button onclick="manualLocate()">Go</button>
</div>

<p id="place">📍 Location: --</p>
<p><b>Lat:</b> <span id="lat"></span> | <b>Lon:</b> <span id="lon"></span></p>

<select id="graphType">
<option value="rain">Rainfall</option>
<option value="temp">Temperature</option>
<option value="ndvi">NDVI</option>
<option value="combined">Combined</option>
<option value="moving">Moving Avg</option>
<option value="variability">Variability</option>
<option value="cumulative">Cumulative</option>
<option value="growth">Growth Index</option>
</select>

<select id="chartStyle">
<option value="line">Line</option>
<option value="bar">Bar</option>
<option value="pie">Pie</option>
<option value="heat">Heatmap</option>
</select>

<canvas id="chart"></canvas>

</div>

<div class="right">

<h3>📊 Results</h3>
<p><b>NDVI:</b> <span id="ndviVal"></span></p>
<p><b>Land:</b> <span id="land"></span></p>
<p><b>Recommendation:</b> <span id="rec"></span></p>

<div class="box">
<h3>🤖 Namibia Agriculture Chatbot</h3>
<div id="chat"></div>
<input id="input" placeholder="Ask about Namibia farming...">
</div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
